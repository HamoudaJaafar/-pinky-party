services:
  - type: web
    name: pinkyparty
    runtime: node
    buildCommand: npm install
    startCommand: node server/server.js
    envVars:
      - key: PORT
        value: 3000
      - key: WHATSAPP_PHONE_NUMBER_ID
        value: "1171876858088077"
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CALLMEBOT_APIKEY_HAMOUDA
        sync: false
      - key: CALLMEBOT_APIKEY_BICHA
        sync: false
